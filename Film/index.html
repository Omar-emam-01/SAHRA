<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SAHRA | عرض الفيلم</title>
</head>

<body>
    <header>
        <a href="../Home/index.html" class="logo-container">
            <img src="../img/logo.png" alt="SAHRA Logo" class="logo-img">
        </a>
        <nav class="navigation">
            <button class="btndisplay-popup">Display</button>
            <a href="../Home/index.html">Back</a>
        </nav>
    </header>

    <div class="wrapper">
        <span class="icon-close"><ion-icon name="close-outline"></ion-icon></span>

        <div class="content-display">
            <h1 id="media-title">Loading...</h1>
            <div class="poster-container">
                <img id="media-poster" src="" alt="Media Poster">
            </div>
            <div class="description-container">
                <p id="media-description">جاري تحميل الملخص...</p>
            </div>
        </div>

        <div class="episodes-area">
            <div id="trailer-container" class="trailer-wrapper"></div>

            <div id="movie-player-section" class="video-display-zone" style="display: none; margin-top: 20px;">
                <h4 id="now-playing" style="color: #0084ff; margin-bottom: 10px; font-size: 1.1rem;">مشاهدة الآن</h4>
                <div class="video-container"
                    style="width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; border: 2px solid #333; overflow: hidden;">
                    <video id="main-video-player" controls style="width: 100%; height: 100%;">
                        <source src="" type="video/mp4">
                        متصفحك لا يدعم تشغيل الفيديو.
                    </video>
                </div>
            </div>

            <div id="action-buttons">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>

</html>

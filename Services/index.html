<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SAHRA | Services</title>
</head>

<body>
    <header>
        <a href="../Home/index.html" class="logo-container">
            <img src="../img/logo.png" alt="SAHRA Logo" class="logo-img">
        </a>

        <nav class="navigation">
            <a href="../Home/index.html">Home</a>
            <a href="../About/index.html">About</a>
            <button class="btnServices-popup">Services</button>
            <a href="../Contact/index.html">Contact</a>
            <a href="../Login & Registration/index.html">Login</a>
        </nav>
    </header>

    <div class="wrapper-services">
        <span class="icon-close"><ion-icon name="close-outline"></ion-icon></span>
        <div class="pricing-container">
            <div class="pricing-card">
                <h3>شهري</h3>
                <div class="price">10$<span>/شهر</span></div>
                <ul>
                    <li><ion-icon name="checkmark-outline"></ion-icon> ميزة تجريبية أولى</li>
                    <li><ion-icon name="checkmark-outline"></ion-icon> دعم فني محدود</li>
                    <li><ion-icon name="checkmark-outline"></ion-icon> وصول لجميع الخدمات</li>
                </ul>
                <button class="btn-buy">اشترك الآن</button>
            </div>

            <div class="pricing-card popular">
                <div class="badge">الأكثر طلباً</div>
                <h3>سنوي</h3>
                <div class="price">100$<span>/سنة</span></div>
                <ul>
                    <li><ion-icon name="checkmark-outline"></ion-icon> كل مميزات الشهري</li>
                    <li><ion-icon name="checkmark-outline"></ion-icon> دعم فني 24/7</li>
                    <li><ion-icon name="checkmark-outline"></ion-icon> خصم 20%</li>
                </ul>
                <button class="btn-buy">اشترك الآن</button>
            </div>

            <div class="pricing-card">
                <h3>10 سنوات</h3>
                <div class="price">800$<span>/عقد</span></div>
                <ul>
                    <li><ion-icon name="checkmark-outline"></ion-icon> وصول مدى الحياة تقريباً</li>
                    <li><ion-icon name="checkmark-outline"></ion-icon> مميزات VIP</li>
                    <li><ion-icon name="checkmark-outline"></ion-icon> تحديثات مجانية دائمًا</li>
                </ul>
                <button class="btn-buy">اشترك الآن</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
